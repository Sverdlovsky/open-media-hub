name: Core Edu - Web Part

on:
  push:
    branches: [ main ]
    paths:
    - 'web/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Web
      uses: docker/build-push-action@v5
      with:
        context: ./web
        push: true
        platforms: linux/amd64
        cache-from: type=registry,ref=ghcr.io/sverdlovsky/core-edu-web:cache
        cache-to: type=registry,ref=ghcr.io/sverdlovsky/core-edu-web:cache,mode=max
        tags: |
          ghcr.io/sverdlovsky/core-edu-web:latest
          ghcr.io/sverdlovsky/core-edu-web:0.2.0

